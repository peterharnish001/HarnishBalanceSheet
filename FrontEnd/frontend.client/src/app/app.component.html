<div class="container">
  @if (!isLoggedIn()) {
    <button (click)="loginRedirect()">
      Login with Microsoft
    </button>
  } @else {
    <button (click)="logoutRedirect()">
      Logout
    </button>
    <router-outlet></router-outlet>
    <ngx-spinner type="ball-beat"><p>Loading...</p></ngx-spinner>
  }
</div>
